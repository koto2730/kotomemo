  <rect x="72" y="116" width="100" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="72" y="136" width="112" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="72" y="156" width="76" height="6" rx="3" fill="#9CA3AF"/>

