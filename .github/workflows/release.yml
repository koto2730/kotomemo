# Release: triggered by pushing a v* tag.
#
# Builds the same per-OS artifacts as build.yml on the same 3-OS matrix,
# then a release job downloads all artifacts and creates a GitHub Release
# as a *draft*. The draft lets the maintainer review the contents and the
# auto-generated release notes before publishing.
#
# Re-tagging will fail because gh release create refuses to overwrite an
# existing release - delete the previous release manually if you need to
# retry a tag.

name: release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            packageTasks: ":composeApp:packagePortableExe :composeApp:packageMsi"
            artifactPath: |
              composeApp/build/portable/kotomemo-*-portable.exe
              composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            label: macos-arm64
            packageTasks: ":composeApp:packageDmg"
            artifactPath: composeApp/build/compose/binaries/main/dmg/*.dmg
          # Pin to 22.04 (glibc 2.35) so the AppImage stays compatible with
          # Ubuntu 22.04 LTS, Debian 12, Fedora 38+ and the rolling distros.
          # ubuntu-latest = 24.04 = glibc 2.39 would silently raise the
          # required-glibc floor on every runner image bump.
          - os: ubuntu-22.04
            label: linux
            packageTasks: ":composeApp:packageAppImage"
            artifactPath: composeApp/build/portable/kotomemo-*-x86_64.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4

      # Strip the leading "v" from the pushed tag (v0.0.1 -> 0.0.1) and pass
      # it as a Gradle property so MSI/DMG packageVersion and the portable
      # exe / AppImage filenames all align with the Release tag.
      - name: Tests + packaging
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building artifacts for version: $VERSION"
          ./gradlew :composeApp:jvmTest ${{ matrix.packageTasks }} -PappVersion="$VERSION" --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: kotomemo-${{ matrix.label }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # GITHUB_TOKEN is read-only by default; releases need contents: write.
    permissions:
      contents: write
    steps:
      # Checkout is needed so gh release --generate-notes can walk the
      # commit graph between tags.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          # No name filter -> download all artifacts uploaded by the build
          # matrix into ./artifacts/<artifact-name>/<files>.
          path: artifacts

      - name: List downloaded artifacts
        run: ls -lR artifacts/

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # upload-artifact@v4 preserves the input path's directory layout,
          # so artifacts/kotomemo-windows/ contains portable/kotomemo-portable.exe
          # and compose/binaries/main/msi/*.msi (nested). A flat glob like
          # artifacts/*/* picks up directories. Use find to collect actual
          # files at any depth.
          mapfile -t files < <(find artifacts -type f)
          printf 'Attaching: %s\n' "${files[@]}"
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --repo "${{ github.repository }}" \
            "${files[@]}"
